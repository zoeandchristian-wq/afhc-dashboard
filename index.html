<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>America First Healthcare &#xB7; Producer Sales Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Serif+Display&family=Libre+Franklin:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:'Libre Franklin',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;}
  .serif{font-family:'DM Serif Display',Georgia,serif;font-weight:400;}

  /* ---- airy white-to-pale-blue field with patriotic texture ---- */
  .app-root{
    background:
      radial-gradient(900px 520px at 88% -8%, rgba(200,162,75,.10), transparent 60%),
      radial-gradient(820px 600px at -6% 4%, rgba(46,85,128,.10), transparent 58%),
      linear-gradient(180deg, #E9F1FA 0%, #F4F9FE 26%, #FFFFFF 70%);
  }
  .app-root::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5;
    background-image:radial-gradient(rgba(46,85,128,.05) 1px, transparent 1.4px);
    background-size:22px 22px;
    -webkit-mask-image:linear-gradient(180deg,#000,transparent 70%);
            mask-image:linear-gradient(180deg,#000,transparent 70%);
  }

  /* ---- header ---- */
  .afhc-header{
    position:relative;overflow:hidden;
    background:linear-gradient(118deg, #0E2138 0%, #143257 46%, #234A78 100%);
    box-shadow:0 14px 40px rgba(15,33,55,.30);
  }
  .afhc-header-wm{
    position:absolute;inset:0;z-index:1;pointer-events:none;
    background:url("e973c9d4-9bc8-4026-b087-899fa03de2cf") no-repeat right -40px top 50%;
    background-size:360px auto;opacity:.06;
    -webkit-mask-image:linear-gradient(90deg,transparent,#000);
            mask-image:linear-gradient(90deg,transparent,#000);
  }
  .afhc-header-rule{height:3px;background:linear-gradient(90deg,#B22A22,#D9362C 40%,#C8A24B 100%);position:relative;z-index:2;}
  .eagle-medallion{
    width:72px;height:72px;border-radius:18px;flex-shrink:0;
    display:grid;place-items:center;
    background:linear-gradient(160deg,#FFFFFF,#EEF4FA);
    box-shadow:0 8px 22px rgba(0,0,0,.28), inset 0 0 0 1px rgba(200,162,75,.55);
  }
  .producer-chip{
    text-align:right;padding:10px 16px;border-radius:12px;
    background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  }

  /* ---- tabs ---- */
  .tab-btn{
    cursor:pointer;border:none;padding:12px 22px;font-weight:700;font-size:14px;font-family:inherit;
    color:rgba(255,255,255,.72);background:transparent;border-radius:12px 12px 0 0;
    position:relative;transition:color .15s, background .15s;
  }
  .tab-btn:hover{color:#fff;background:rgba(255,255,255,.08);}
  .tab-btn.on{color:#143257;background:#F4F9FE;box-shadow:0 -2px 10px rgba(15,33,55,.12);}
  .tab-btn.on::after{content:"";position:absolute;left:0;right:0;top:0;height:3px;background:linear-gradient(90deg,#D9362C,#C8A24B);border-radius:3px 3px 0 0;}

  /* ---- glass / cards ---- */
  .glass-card{
    background:linear-gradient(165deg, rgba(255,255,255,.96), rgba(248,251,254,.92));
    border:1px solid rgba(220,230,240,.9);
    box-shadow:0 1px 0 rgba(255,255,255,.7) inset, 0 12px 34px rgba(27,58,95,.09);
    backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  }
  .kpi-card{
    background:linear-gradient(165deg,#FFFFFF,#F6FAFE);
    border:1px solid rgba(220,230,240,.9);border-radius:16px;padding:20px;
    display:flex;flex-direction:column;justify-content:center;
    box-shadow:0 8px 24px rgba(27,58,95,.08);
  }
  .lift{transition:transform .18s cubic-bezier(.2,.7,.3,1), box-shadow .18s;}
  .lift:hover{transform:translateY(-3px);box-shadow:0 16px 36px rgba(27,58,95,.16);}

  .goal-card, .rates-hero{
    position:relative;overflow:hidden;border-radius:18px;color:#fff;
    background:linear-gradient(140deg,#13294A 0%,#1B3A5F 52%,#2E5580 100%);
    box-shadow:0 16px 40px rgba(19,41,74,.34);
  }
  .goal-card{padding:22px 26px;}
  .rates-hero{padding:24px 28px;margin-bottom:24px;}
  .goal-card::after, .rates-hero::after{
    content:"";position:absolute;left:0;right:0;top:0;height:50%;
    background:linear-gradient(180deg,rgba(255,255,255,.10),transparent);pointer-events:none;
  }
  .goal-wm{position:absolute;right:-18px;top:-12px;opacity:.10;z-index:1;}
  .goal-bar{
    height:100%;border-radius:7px;
    background:linear-gradient(90deg,#D9362C,#C8A24B);
    box-shadow:0 0 14px rgba(200,162,75,.5);
    transition:width 1s cubic-bezier(.2,.7,.3,1);position:relative;overflow:hidden;
  }
  .goal-bar::after{
    content:"";position:absolute;inset:0;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.45),transparent);
    transform:translateX(-100%);animation:shimmer 2.6s ease-in-out infinite;
  }
  @keyframes shimmer{0%{transform:translateX(-100%);}55%,100%{transform:translateX(220%);}}

  /* ---- form sections ---- */
  .sect{border:1px solid #E6EDF5;border-radius:14px;padding:18px;background:linear-gradient(170deg,#FCFDFF,#F8FBFE);}
  .sect-h{font-family:'DM Serif Display',serif;font-size:16px;color:#1B3A5F;margin-bottom:14px;display:flex;align-items:center;gap:9px;}
  .step-n{
    width:24px;height:24px;border-radius:8px;flex-shrink:0;
    display:grid;place-items:center;font-family:'Libre Franklin',sans-serif;
    font-size:12px;font-weight:800;color:#fff;
    background:linear-gradient(140deg,#D9362C,#B22A22);box-shadow:0 3px 8px rgba(217,54,44,.3);
  }
  .slack-box{
    background:linear-gradient(140deg,#0F1B2D,#152A45);border:1px solid rgba(200,162,75,.18);
    border-radius:14px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;
    gap:12px;flex-wrap:wrap;box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
  }

  /* ---- interactive states ---- */
  input:focus,select:focus{outline:none;border-color:#2E5580;box-shadow:0 0 0 3px rgba(46,85,128,.14);}
  .hov:hover{background:#F1F6FC !important;}
  .chip:hover{transform:translateY(-1px);}
  .icon-btn{transition:color .15s, transform .12s;}
  .icon-btn:hover{transform:scale(1.18);color:#D9362C !important;}
  .sec-add:hover{background:rgba(46,85,128,.07) !important;}
  .btn-add:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 12px 26px rgba(217,54,44,.42) !important;}
  .btn-copy:hover:not(:disabled){filter:brightness(1.12);}

  /* ---- entrance: keep content ALWAYS visible (count-up provides the motion) ---- */
  .rise{opacity:1;}

  /* My Deals table breaks out of the 1120 content column to use the full
     window width, so the fulfillment/tracking columns fit without left-right
     scrolling on normal-width screens. */
  .deals-wide{
    width: min(1880px, calc(100vw - 56px));
    margin-left: 50%;
    transform: translateX(-50%);
  }
  @media(max-width:1180px){
    .deals-wide{ width: 100%; margin-left: 0; transform: none; }
  }

  @media(max-width:880px){
    .dash-hero{grid-template-columns:1fr 1fr !important;}
  }
  @media(max-width:560px){
    .dash-hero{grid-template-columns:1fr !important;}
    .av-stats{grid-template-columns:1fr !important;}
  }
</style>
</head>
